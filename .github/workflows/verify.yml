name: Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # restore-keys fallback ensures a cache miss on first run (no lockfile yet)
          # does not fail the job — npm install will regenerate the lockfile.

      - name: Install dependencies
        # npm install (not npm ci) — no committed package-lock.json in a greenfield repo.
        # npm ci hard-fails without a matching lockfile; npm install resolves and creates one.
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type-check (JSX project — skipped; no tsconfig present)
        # This project is plain JSX, not TypeScript. tsc --noEmit is omitted to
        # avoid a missing-tsconfig failure. Add a tsconfig.json to enable this step.
        run: echo "No TypeScript config — skipping tsc step."

      - name: Run tests
        run: npm test
