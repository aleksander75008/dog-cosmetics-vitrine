name: Verify

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install dependencies
        # npm install (not npm ci) — no committed lockfile in a greenfield repo.
        # npm install resolves deps fresh and writes package-lock.json in the runner.
        run: npm install

      - name: Run tests
        run: npm test
