name: verify

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm' is intentionally omitted — no lockfile is committed.
          # The acceptance criteria requires npm install (not npm ci) with no
          # package-lock.json. Caching is keyed to package.json via actions/cache below.

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
